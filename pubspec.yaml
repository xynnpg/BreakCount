  nearby_connections: ^4.0.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  timezone: ^0.9.4
  add_2_calendar: ^3.0.1
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
