name: breakcount
description: "Countdown to your next school break"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  share_plus: ^10.0.0
  http: ^1.2.0
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.1
  sensors_plus: ^4.0.2
  image_picker: ^1.1.2
